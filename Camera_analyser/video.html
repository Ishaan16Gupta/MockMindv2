<!DOCTYPE html>
<html>
<head>
  <title>MediaPipe Demo</title>
  <style>
    #video {
      display: block;
      width: 640px;
      max-width: 100%;
      margin-bottom: 12px;
      background: #000;
    }

    #chat {
      min-height: 120px;
      width: 640px;
      max-width: 100%;
      border: 1px solid #ccc;
      padding: 8px;
      font-family: sans-serif;
      overflow-y: auto;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div id = "chat"></div>
  <script defer src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script defer     src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script defer src="script.js"></script>
</body>
</html>
